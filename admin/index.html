<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CMS Admin - Helmi Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <!-- Login Section -->
  <div id="login-section" class="login-page">
    <div class="login-ornament ornament-3"></div>
    <div class="login-ornament ornament-1"></div>
    <div class="login-ornament ornament-2"></div>
    <div class="login-box">
      <div class="login-header">
        <h2>Helmi CMS</h2>
        <p>Login to manage your portfolio</p>
      </div>
      <form id="login-form">
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="username" placeholder="Enter username" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Login</button>
        <p id="login-error" class="error"></p>
      </form>
    </div>
  </div>

  <!-- Admin Dashboard Section -->
  <div id="admin-section" class="cms-layout" style="display: none;">
    <!-- Sidebar Navigation -->
    <aside class="cms-sidebar">
      <div class="sidebar-brand">
        <h3>
          <svg viewBox="0 0 24 24" width="24" height="24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
          Helmi CMS
        </h3>
      </div>
      <nav class="sidebar-nav tabs">
        <div class="nav-label">Content Entries</div>
        <button class="tab-btn active" data-tab="experiences">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg>
          Pengalaman
        </button>
        <button class="tab-btn" data-tab="organizations">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
          Organisasi
        </button>
        <button class="tab-btn" data-tab="certifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="7"></circle><polyline points="8.21 13.89 7 23 12 20 17 23 15.79 13.88"></polyline></svg>
          Sertifikasi
        </button>
        <button class="tab-btn" data-tab="contents">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="20" height="20" rx="2.18" ry="2.18"></rect><line x1="7" y1="2" x2="7" y2="22"></line><line x1="17" y1="2" x2="17" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line><line x1="2" y1="7" x2="7" y2="7"></line><line x1="2" y1="17" x2="7" y2="17"></line><line x1="17" y1="17" x2="22" y2="17"></line><line x1="17" y1="7" x2="22" y2="7"></line></svg>
          Konten Video
        </button>
      </nav>
      <div class="sidebar-bottom">
        <button id="logout-btn" class="btn btn-outline btn-block">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
          Logout
        </button>
      </div>
    </aside>

    <!-- Main Content Area -->
    <main class="cms-main">
      <header class="cms-header">
        <div class="header-title">
          <h2 id="current-page-title">Pengalaman</h2>
        </div>
        <div class="header-actions">
          <span id="save-status"></span>
          <button id="save-btn" class="btn btn-primary">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
            Simpan Perubahan
          </button>
        </div>
      </header>

      <div class="cms-content">
        <div class="content-header">
          <h3>Manage Entries</h3>
          <button class="btn btn-secondary" onclick="addNewItem()">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Tambah Item Baru
          </button>
        </div>
        
        <div id="editor-container">
          <!-- Editor cards will be generated here -->
        </div>
      </div>
    </main>
  </div>

  <script src="admin.js"></script>
</body>
</html>
